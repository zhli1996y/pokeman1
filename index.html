<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口袋妖怪：网页联机版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #game-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .hp-bar { height: 10px; background: #eee; border-radius: 5px; margin: 5px 0; overflow: hidden; }
        .hp-fill { height: 100%; background: #4caf50; transition: width 0.3s; }
        .log { height: 150px; border: 1px solid #ddd; margin: 10px 0; padding: 10px; overflow-y: auto; font-size: 14px; background: #fafafa; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; background: #3498db; color: white; cursor: pointer; }
        button:disabled { background: #ccc; }
        input { padding: 8px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>Pokémon Web Battle</h2>
        
        <div id="setup">
            <p>我的 ID: <strong id="my-id">正在生成...</strong></p>
            <input type="text" id="peer-id-input" placeholder="输入朋友的 ID">
            <button onclick="connectToPeer()">连接朋友</button>
            <p style="font-size: 12px; color: #666;">发送你的ID给朋友，或者输入对方的ID开始。</p>
        </div>

        <div id="battle-area" class="hidden">
            <div id="opp-info">
                <strong>对方: <span id="opp-name">???</span></strong>
                <div class="hp-bar"><div id="opp-hp-fill" class="hp-fill" style="width: 100%;"></div></div>
            </div>
            
            <div id="my-info" style="margin-top: 20px;">
                <strong>我方: <span id="my-name">???</span></strong>
                <div class="hp-bar"><div id="my-hp-fill" class="hp-fill" style="width: 100%;"></div></div>
            </div>

            <div class="log" id="battle-log">等待战斗开始...</div>

            <div class="btn-grid" id="action-buttons">
                <button onclick="attack(0)">撞击</button>
                <button onclick="attack(1)">特殊攻击</button>
            </div>
        </div>
    </div>

<script>
    const POKEMON_DATA = [
        { name: "小火龙", hp: 100, type: "火", skills: ["抓击", "火花"], atk: [15, 25] },
        { name: "杰尼龟", hp: 110, type: "水", skills: ["撞击", "水枪"], atk: [12, 22] },
        { name: "妙蛙种子", hp: 105, type: "草", skills: ["撞击", "藤鞭"], atk: [13, 23] }
    ];

    let peer, conn;
    let myPoke, oppPoke;
    let myHP, oppHP;
    let myTurn = false;

    // 初始化 PeerJS
    peer = new Peer();
    peer.on('open', id => document.getElementById('my-id').innerText = id);

    // 监听他人连接请求
    peer.on('connection', c => {
        conn = c;
        setupConnection();
    });

    function connectToPeer() {
        const id = document.getElementById('peer-id-input').value;
        conn = peer.connect(id);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('battle-area').classList.remove('hidden');
            
            // 随机分配宝可梦
            myPoke = POKEMON_DATA[Math.floor(Math.random() * POKEMON_DATA.length)];
            myHP = myPoke.hp;
            
            // 发送数据
            conn.send({ type: 'INIT', poke: myPoke });
        });

        conn.on('data', data => {
            if (data.type === 'INIT') {
                oppPoke = data.poke;
                oppHP = oppPoke.hp;
                updateUI();
                log(`战斗开始！对方派出了 ${oppPoke.name}`);
                myTurn = true; // 先连入者或随机一方先手
            } else if (data.type === 'ATTACK') {
                handleOpponentAttack(data);
            }
        });
    }

    function log(msg) {
        const logBox = document.getElementById('battle-log');
        logBox.innerHTML += `<div>${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function updateUI() {
        document.getElementById('my-name').innerText = myPoke.name;
        document.getElementById('opp-name').innerText = oppPoke.name;
        document.getElementById('my-hp-fill').style.width = (myHP / myPoke.hp * 100) + "%";
        document.getElementById('opp-hp-fill').style.width = (oppHP / oppPoke.hp * 100) + "%";
        
        const btns = document.querySelectorAll('#action-buttons button');
        btns[0].innerText = myPoke.skills[0];
        btns[1].innerText = myPoke.skills[1];
        btns.forEach(b => b.disabled = !myTurn);
    }

    function attack(skillIdx) {
        if (!myTurn) return;
        const damage = myPoke.atk[skillIdx] + Math.floor(Math.random() * 5);
        oppHP = Math.max(0, oppHP - damage);
        
        log(`你使用了 ${myPoke.skills[skillIdx]}，造成了 ${damage} 点伤害！`);
        conn.send({ type: 'ATTACK', skill: myPoke.skills[skillIdx], dmg: damage });
        
        myTurn = false;
        updateUI();
        checkEnd();
    }

    function handleOpponentAttack(data) {
        myHP = Math.max(0, myHP - data.dmg);
        log(`对方使用了 ${data.skill}，你受到了 ${data.dmg} 点伤害！`);
        myTurn = true;
        updateUI();
        checkEnd();
    }

    function checkEnd() {
        if (myHP <= 0) log("<b>你输了...</b>");
        if (oppHP <= 0) log("<b>你赢了！</b>");
    }
</script>
</body>
</html>
